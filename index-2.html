<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#F3F1EA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="나의 기록" />
<title>나의 기록</title>
<style>
  :root{
    --paper:#F3F1EA; --surface:#FCFBF7; --ink:#211E1A; --sub:#7C756B;
    --line:#E2DDD1; --work:#4F6D4A; --thought:#B07D2B; --danger:#B4493C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    -webkit-text-size-adjust:100%;
  }
  button{font-family:inherit;}

  /* ── header ── */
  header{
    position:sticky; top:0; z-index:5; background:var(--paper);
    border-bottom:1px solid var(--line); padding:16px 20px 14px;
    padding-top:calc(16px + env(safe-area-inset-top));
  }
  .filebar{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .filebar .label{font-size:13px; font-weight:700; color:var(--sub);}
  .filebar .right{margin-left:auto; display:flex; gap:8px;}
  .fbtn{
    padding:5px 11px; border-radius:9px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .datenav{display:flex; align-items:center; justify-content:space-between;}
  .nav{
    width:36px; height:36px; border-radius:10px; border:none; background:transparent;
    color:var(--ink); font-size:26px; line-height:1; cursor:pointer;
  }
  .nav:disabled{opacity:.25;}
  .dtitle{font-size:21px; font-weight:700; letter-spacing:-.02em; text-align:center;}
  .dyear{font-size:12px; color:var(--sub); margin-top:2px; text-align:center;}
  .badge{margin-left:8px; color:var(--work); font-weight:600;}
  .summary{margin-top:12px; display:flex; align-items:center; gap:14px; font-size:12.5px; color:var(--sub);}
  .summary .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle;}
  .summary .span{margin-left:auto;}
  .todaybtn{background:none; border:none; color:var(--work); font-weight:600; font-size:12.5px; cursor:pointer;}

  /* ── timeline ── */
  main{flex:1; padding:8px 20px 16px;}
  .empty{text-align:center; margin-top:70px; color:var(--sub);}
  .empty .ico{font-size:30px; margin-bottom:12px;}
  .empty p{font-size:15px; line-height:1.6; margin:0;}
  .thread{position:relative; padding-left:22px; margin-top:14px;}
  .thread::before{content:""; position:absolute; left:5px; top:6px; bottom:6px; width:2px; background:var(--line);}
  .entry{position:relative; padding-bottom:18px;}
  .node{
    position:absolute; left:-21px; top:5px; width:12px; height:12px; border-radius:50%;
    box-sizing:border-box; background:var(--surface);
  }
  .node.work{border:2.5px solid var(--work); background:var(--work);}
  .node.thought{border:2.5px solid var(--thought);}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:10px 13px; cursor:pointer;
  }
  .card.work{border-left:3px solid var(--work);}
  .card.thought{border-left:3px solid var(--thought);}
  .meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .meta .time{font-size:11.5px; color:var(--sub); font-weight:600;}
  .meta .tag{font-size:11px; font-weight:600;}
  .tag.work{color:var(--work);} .tag.thought{color:var(--thought);}
  .text{margin:0; font-size:15px; line-height:1.5; color:var(--ink); white-space:pre-wrap;}
  .text.thought{font-style:italic;}
  .actions{margin-top:10px; display:flex; gap:16px;}
  .actions button{background:none; border:none; font-size:12.5px; font-weight:600; cursor:pointer; padding:0;}
  .actions .editbtn{color:var(--work);}
  .actions .delbtn{color:var(--danger);}

  /* ── edit form ── */
  .editcard{background:var(--surface); border:1px solid var(--work); border-left:3px solid var(--work); border-radius:12px; padding:12px 13px;}
  .editcard.thought{border-color:var(--thought); border-left-color:var(--thought);}
  .segs{display:flex; gap:8px; margin-bottom:8px;}
  .seg{flex:1; padding:7px 0; border-radius:10px; border:1px solid var(--line); background:transparent; color:var(--sub); font-size:13.5px; font-weight:600; cursor:pointer;}
  .seg.work.active{background:var(--work); border-color:var(--work); color:#fff;}
  .seg.thought.active{background:var(--thought); border-color:var(--thought); color:#fff;}
  .editta{width:100%; resize:none; border:1px solid var(--line); border-radius:10px; background:var(--paper); padding:9px 11px; font-size:15px; color:var(--ink); font-family:inherit; line-height:1.45; outline:none;}
  .editrow{display:flex; align-items:center; gap:10px; margin-top:10px;}
  .editrow label{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--sub);}
  .editrow input[type=time]{border:1px solid var(--line); border-radius:8px; background:var(--paper); color:var(--ink); font-size:13.5px; font-family:inherit; padding:4px 8px; outline:none;}
  .editrow .sp{margin-left:auto; display:flex; gap:8px;}
  .cancelbtn{background:none; border:none; color:var(--sub); font-size:13px; font-weight:600; cursor:pointer;}
  .savebtn{border:none; border-radius:8px; background:var(--work); color:#fff; font-size:13px; font-weight:600; padding:6px 14px; cursor:pointer;}
  .savebtn.thought{background:var(--thought);}

  /* ── composer ── */
  .composer{
    position:sticky; bottom:0; background:var(--paper); border-top:1px solid var(--line);
    padding:10px 16px 14px; padding-bottom:calc(14px + env(safe-area-inset-bottom));
  }
  .timerow{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .timerow .lab{font-size:12.5px; color:var(--sub);}
  .chip{padding:5px 11px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--sub); font-size:13.5px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  .chip.active{background:var(--work); border-color:var(--work); color:#fff;}
  .chip input[type=time]{border:none; background:transparent; color:inherit; font-size:13.5px; font-family:inherit; outline:none; padding:0;}
  .inputrow{display:flex; gap:8px; align-items:flex-end;}
  .inputrow textarea{
    flex:1; resize:none; border:1px solid var(--line); border-radius:14px; background:var(--surface);
    padding:11px 14px; font-size:15px; color:var(--ink); font-family:inherit; line-height:1.45; max-height:120px; outline:none;
  }
  .send{flex-shrink:0; width:46px; height:46px; border-radius:50%; border:none; background:var(--line); color:#fff; font-size:20px; cursor:pointer; transition:background .15s;}
  .send.work.on{background:var(--work);} .send.thought.on{background:var(--thought);}

  /* ── toast ── */
  .toast{
    position:fixed; left:50%; bottom:120px; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--surface); font-size:13.5px; font-weight:600;
    padding:9px 16px; border-radius:20px; box-shadow:0 4px 16px rgba(0,0,0,.18);
    z-index:20; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ── view toggle ── */
  .viewtoggle{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:2px;}
  .vt{border:none; background:transparent; color:var(--sub); font-size:13px; font-weight:700; padding:4px 13px; border-radius:7px; cursor:pointer;}
  .vt.active{background:var(--ink); color:var(--paper);}

  /* ── calendar (월 보기) ── */
  .cal{margin-top:6px;}
  .calhead{display:grid; grid-template-columns:repeat(7,1fr);}
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:2px;}
  .cwd{text-align:center; font-size:11.5px; color:var(--sub); font-weight:700; padding:6px 0;}
  .cwd.sun{color:var(--danger);}
  .cell{position:relative; min-height:54px; border-radius:10px; padding:7px 0 0; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer;}
  .cell.empty{cursor:default;}
  .cell.has{background:var(--surface); border:1px solid var(--line);}
  .cnum{font-size:14px; color:var(--ink);}
  .cell.today .cnum{background:var(--work); color:#fff; width:24px; height:24px; line-height:24px; border-radius:50%; text-align:center;}
  .cdots{display:flex; gap:3px; height:6px; align-items:center;}
  .cdot{width:5px; height:5px; border-radius:50%;}
  .cdot.w{background:var(--work);}
  .cdot.t{background:var(--thought);}
</style>
</head>
<body>
  <header>
    <div class="filebar">
      <div class="viewtoggle">
        <button class="vt active" id="vtDay">일</button>
        <button class="vt" id="vtMonth">월</button>
      </div>
      <div class="right">
        <button class="fbtn" id="importBtn">불러오기</button>
        <button class="fbtn" id="exportBtn">내보내기</button>
      </div>
      <input type="file" id="fileInput" accept="application/json,.json" style="display:none" />
    </div>
    <div class="datenav">
      <button class="nav" id="prevBtn">‹</button>
      <div>
        <div class="dtitle" id="dtitle"></div>
        <div class="dyear" id="dyear"></div>
      </div>
      <button class="nav" id="nextBtn">›</button>
    </div>
    <div class="summary" id="summary"></div>
  </header>

  <main>
    <div id="timeline"></div>
    <div id="bottom"></div>
  </main>

  <div class="composer" id="composer">
    <div class="segs">
      <button class="seg work active" id="segWork">기록</button>
      <button class="seg thought" id="segThought">생각</button>
    </div>
    <div class="timerow">
      <span class="lab">시각</span>
      <button class="chip active" id="chipNow">지금</button>
      <label class="chip" id="chipCustom">
        <span>시간 지정</span>
        <input type="time" id="timeInput" />
      </label>
    </div>
    <div class="inputrow">
      <textarea id="ta" rows="1" placeholder="지금 무엇을 하고 있나요?"></textarea>
      <button class="send work" id="send">↑</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ── 저장소 (폰 저장소 우선, 안되면 메모리) ──
  var mem = {};
  var store = {
    get:function(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; } },
    set:function(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
  };
  var STORE_KEY = "diary-all";

  // ── 상태 ──
  var data = {};
  try{ var raw = store.get(STORE_KEY); data = raw ? JSON.parse(raw) : {}; }catch(e){ data = {}; }
  if(!data || typeof data !== "object") data = {};

  var date = new Date();
  var view = "day";             // "day" | "month"
  var type = "work";            // "work" | "thought"
  var customTime = null;        // null = 지금, else "HH:MM"
  var openId = null;            // 동작(수정/삭제)이 열린 항목
  var editId = null;            // 편집 중인 항목

  var DAYS = ["일","월","화","수","목","금","토"];

  // ── 헬퍼 ──
  function pad(n){ return (n<10?"0":"")+n; }
  function keyOf(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function sameDay(a,b){ return keyOf(a)===keyOf(b); }
  function nowHHMM(){ var d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes()); }
  function hhmmOf(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
  function fmtTime(iso){
    var d=new Date(iso), h=d.getHours(), m=pad(d.getMinutes());
    var ap = h<12 ? "오전":"오후"; h = (h%12)||12;
    return ap+" "+h+":"+m;
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  }); }
  function entriesOf(d){ return data[keyOf(d)] || []; }
  function bySort(a,b){ return new Date(a.at) - new Date(b.at); }

  function persist(){
    store.set(STORE_KEY, JSON.stringify(data));
  }
  function setDay(list){
    data[keyOf(date)] = list;
    persist();
    render();
  }

  // ── 알림 ──
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function flash(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ── 렌더 ──
  var dtitle = document.getElementById("dtitle");
  var dyear  = document.getElementById("dyear");
  var summary= document.getElementById("summary");
  var timeline = document.getElementById("timeline");
  var bottom = document.getElementById("bottom");
  var nextBtn = document.getElementById("nextBtn");

  function applyView(){
    document.getElementById("composer").style.display = (view==="month") ? "none" : "block";
  }

  function render(){
    applyView();
    if(view==="month") renderMonth();
    else renderDay();
  }

  function renderDay(){
    var today = new Date();
    var isToday = sameDay(date, today);
    var list = entriesOf(date);

    // 헤더
    dtitle.textContent = (date.getMonth()+1)+"월 "+date.getDate()+"일 "+DAYS[date.getDay()]+"요일";
    dyear.innerHTML = date.getFullYear() + (isToday ? ' <span class="badge">오늘</span>' : '');
    nextBtn.disabled = isToday;

    // 요약
    var work = list.filter(function(e){return e.type==="work";}).length;
    var thought = list.length - work;
    var s = "";
    if(list.length === 0){
      s = '<span>아직 기록이 없어요</span>';
    } else {
      var spanTxt = fmtTime(list[0].at)+" – "+fmtTime(list[list.length-1].at);
      s = '<span><span class="dot" style="background:var(--work)"></span>기록 '+work+'</span>'
        + '<span><span class="dot" style="border:2px solid var(--thought)"></span>생각 '+thought+'</span>'
        + '<span class="span">'+spanTxt+'</span>';
    }
    if(!isToday){
      s += '<button class="todaybtn" id="todayBtn" style="margin-left:'+(list.length===0?'auto':'0')+'">오늘로 →</button>';
    }
    summary.innerHTML = s;
    var tb = document.getElementById("todayBtn");
    if(tb) tb.onclick = function(){ goToday(); };

    // 타임라인
    if(list.length === 0){
      timeline.innerHTML =
        '<div class="empty"><div class="ico">🗒️</div><p>'+
        (isToday ? '오늘의 첫 기록을 남겨보세요.<br>하루가 끝나면 여기에 정리돼요.' : '이 날엔 기록이 없어요.')+
        '</p></div>';
      return;
    }

    var html = '<div class="thread">';
    list.forEach(function(e){
      var isWork = e.type === "work";
      if(e.id === editId){
        html += renderEdit(e, isWork);
      } else {
        var nodeCls = isWork ? "work" : "thought";
        var acts = (e.id === openId)
          ? '<div class="actions"><button class="editbtn" data-action="edit" data-id="'+e.id+'">수정</button>'
            + '<button class="delbtn" data-action="delete" data-id="'+e.id+'">삭제</button></div>'
          : '';
        html += '<div class="entry">'
          + '<span class="node '+nodeCls+'"></span>'
          + '<div class="card '+nodeCls+'" data-action="toggle" data-id="'+e.id+'">'
          + '<div class="meta"><span class="time">'+fmtTime(e.at)+'</span>'
          + '<span class="tag '+nodeCls+'">'+(isWork?"기록":"생각")+'</span></div>'
          + '<p class="text '+(isWork?"":"thought")+'">'+esc(e.text)+'</p>'
          + acts + '</div></div>';
      }
    });
    html += '</div>';
    timeline.innerHTML = html;
  }

  function renderMonth(){
    var now = new Date();
    var y = date.getFullYear(), mo = date.getMonth();
    var isCurMonth = (y===now.getFullYear() && mo===now.getMonth());
    var isFutureMonth = (y > now.getFullYear()) || (y===now.getFullYear() && mo > now.getMonth());

    // 헤더
    dtitle.textContent = y + "년 " + (mo+1) + "월";
    dyear.innerHTML = isCurMonth ? '<span class="badge">이번 달</span>' : '&nbsp;';
    nextBtn.disabled = isCurMonth || isFutureMonth;

    // 한 달 요약
    var daysInMonth = new Date(y, mo+1, 0).getDate();
    var work=0, thought=0, daysWith=0;
    for(var d=1; d<=daysInMonth; d++){
      var list = data[y+"-"+pad(mo+1)+"-"+pad(d)] || [];
      if(list.length){ daysWith++; }
      list.forEach(function(e){ if(e.type==="work") work++; else thought++; });
    }
    if(work+thought===0){
      summary.innerHTML = '<span>이 달엔 기록이 없어요</span>';
    } else {
      summary.innerHTML =
        '<span><span class="dot" style="background:var(--work)"></span>기록 '+work+'</span>'
      + '<span><span class="dot" style="border:2px solid var(--thought)"></span>생각 '+thought+'</span>'
      + '<span class="span">'+daysWith+'일 기록</span>';
    }

    // 달력
    var startWd = new Date(y, mo, 1).getDay();
    var html = '<div class="cal"><div class="calhead">';
    for(var w=0; w<7; w++){ html += '<div class="cwd'+(w===0?' sun':'')+'">'+DAYS[w]+'</div>'; }
    html += '</div><div class="calgrid">';
    for(var b=0; b<startWd; b++){ html += '<div class="cell empty"></div>'; }
    for(var dd=1; dd<=daysInMonth; dd++){
      var k = y+"-"+pad(mo+1)+"-"+pad(dd);
      var dl = data[k] || [];
      var dots = '';
      if(dl.some(function(e){return e.type==="work";})) dots += '<span class="cdot w"></span>';
      if(dl.some(function(e){return e.type==="thought";})) dots += '<span class="cdot t"></span>';
      var cellToday = (isCurMonth && dd===now.getDate());
      html += '<div class="cell'+(cellToday?' today':'')+(dl.length?' has':'')+'" data-action="goday" data-key="'+k+'">'
        + '<span class="cnum">'+dd+'</span>'
        + '<span class="cdots">'+dots+'</span></div>';
    }
    html += '</div></div>';
    timeline.innerHTML = html;
  }

  function renderEdit(e, isWork){
    var draftType = e.type;
    var cls = draftType==="work" ? "work" : "thought";
    return '<div class="entry">'
      + '<span class="node '+cls+'"></span>'
      + '<div class="editcard '+(draftType==="thought"?"thought":"")+'" data-form="'+e.id+'" data-type="'+draftType+'">'
      + '<div class="segs">'
      +   '<button class="seg work '+(draftType==="work"?"active":"")+'" data-action="etype" data-t="work" data-id="'+e.id+'">기록</button>'
      +   '<button class="seg thought '+(draftType==="thought"?"active":"")+'" data-action="etype" data-t="thought" data-id="'+e.id+'">생각</button>'
      + '</div>'
      + '<textarea class="editta" rows="2">'+esc(e.text)+'</textarea>'
      + '<div class="editrow">'
      +   '<label>시각<input type="time" value="'+hhmmOf(e.at)+'"></label>'
      +   '<div class="sp">'
      +     '<button class="cancelbtn" data-action="cancel">취소</button>'
      +     '<button class="savebtn '+(draftType==="thought"?"thought":"")+'" data-action="save" data-id="'+e.id+'">저장</button>'
      +   '</div>'
      + '</div></div></div>';
  }

  // ── 타임라인 이벤트 (위임) ──
  timeline.addEventListener("click", function(ev){
    var t = ev.target.closest("[data-action]");
    if(!t) return;
    var action = t.getAttribute("data-action");
    var id = t.getAttribute("data-id");
    var list = entriesOf(date);

    if(action === "toggle"){
      var nid = Number(id);
      openId = (openId === nid) ? null : nid;
      render();
    }
    else if(action === "goday"){
      var p = t.getAttribute("data-key").split("-");
      date = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
      view = "day";
      syncViewToggle();
      afterDateChange();
    }
    else if(action === "edit"){
      editId = Number(id); openId = null; render();
    }
    else if(action === "delete"){
      setDay(list.filter(function(e){ return e.id !== Number(id); }));
    }
    else if(action === "cancel"){
      editId = null; render();
    }
    else if(action === "etype"){
      // 편집 폼 안에서 종류 전환 (재렌더 없이 클래스만 변경)
      var form = t.closest(".editcard");
      var newT = t.getAttribute("data-t");
      form.setAttribute("data-type", newT);
      form.classList.toggle("thought", newT==="thought");
      var segs = form.querySelectorAll(".seg");
      segs.forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-t")===newT); });
      var sv = form.querySelector(".savebtn");
      sv.classList.toggle("thought", newT==="thought");
    }
    else if(action === "save"){
      var form = t.closest(".editcard");
      var newText = form.querySelector(".editta").value.trim();
      if(!newText) return;
      var newType = form.getAttribute("data-type");
      var tm = form.querySelector('input[type=time]').value || hhmmOf(new Date().toISOString());
      var parts = tm.split(":");
      var nid2 = Number(id);
      var next = list.map(function(e){
        if(e.id !== nid2) return e;
        var at = new Date(e.at);
        at.setHours(Number(parts[0]), Number(parts[1]), 0, 0);
        return { id:e.id, at:at.toISOString(), type:newType, text:newText };
      }).sort(bySort);
      editId = null;
      setDay(next);
    }
  });

  // ── 날짜 이동 ──
  function shiftDay(n){
    var d = new Date(date); d.setDate(d.getDate()+n); date = d;
    afterDateChange();
  }
  function shiftMonth(n){
    date = new Date(date.getFullYear(), date.getMonth()+n, 1);
    afterDateChange();
  }
  function goToday(){ date = new Date(); afterDateChange(); }
  function afterDateChange(){
    customTime = null; openId = null; editId = null;
    syncTimeChips();
    render();
  }
  document.getElementById("prevBtn").onclick = function(){
    if(view==="month") shiftMonth(-1); else shiftDay(-1);
  };
  document.getElementById("nextBtn").onclick = function(){
    if(nextBtn.disabled) return;
    if(view==="month") shiftMonth(1); else shiftDay(1);
  };

  // ── 일 / 월 보기 전환 ──
  var vtDay = document.getElementById("vtDay");
  var vtMonth = document.getElementById("vtMonth");
  function syncViewToggle(){
    vtDay.classList.toggle("active", view==="day");
    vtMonth.classList.toggle("active", view==="month");
  }
  vtDay.onclick = function(){ if(view==="day") return; view="day"; openId=null; editId=null; syncViewToggle(); render(); };
  vtMonth.onclick = function(){ if(view==="month") return; view="month"; openId=null; editId=null; syncViewToggle(); render(); };

  // ── 작성 ──
  var ta = document.getElementById("ta");
  var sendBtn = document.getElementById("send");
  var segWork = document.getElementById("segWork");
  var segThought = document.getElementById("segThought");
  var chipNow = document.getElementById("chipNow");
  var chipCustom = document.getElementById("chipCustom");
  var timeInput = document.getElementById("timeInput");

  function syncSegs(){
    segWork.classList.toggle("active", type==="work");
    segThought.classList.toggle("active", type==="thought");
    ta.placeholder = type==="work" ? "지금 무엇을 하고 있나요?" : "떠오른 생각을 적어보세요";
    syncSend();
  }
  function syncSend(){
    sendBtn.className = "send " + type + (ta.value.trim() ? " on" : "");
  }
  function syncTimeChips(){
    var custom = customTime !== null;
    chipNow.classList.toggle("active", !custom);
    chipCustom.classList.toggle("active", custom);
    timeInput.value = customTime !== null ? customTime : nowHHMM();
  }

  segWork.onclick = function(){ type="work"; syncSegs(); };
  segThought.onclick = function(){ type="thought"; syncSegs(); };
  chipNow.onclick = function(){ customTime=null; syncTimeChips(); };
  timeInput.onchange = function(){ customTime = timeInput.value; syncTimeChips(); };
  ta.addEventListener("input", syncSend);
  ta.addEventListener("keydown", function(ev){
    if(ev.key==="Enter" && !ev.shiftKey){ ev.preventDefault(); add(); }
  });
  sendBtn.onclick = add;

  function add(){
    var txt = ta.value.trim();
    if(!txt) return;
    var at = new Date(date);
    var tm = (customTime !== null ? customTime : nowHHMM()).split(":");
    at.setHours(Number(tm[0]), Number(tm[1]), 0, 0);
    var entry = { id:Date.now(), at:at.toISOString(), type:type, text:txt };
    var list = entriesOf(date).concat([entry]).sort(bySort);
    ta.value = "";
    syncSend();
    setDay(list);
    setTimeout(function(){ bottom.scrollIntoView({behavior:"smooth"}); }, 30);
  }

  // ── 파일 ──
  document.getElementById("exportBtn").onclick = function(){
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "다이어리-"+keyOf(new Date())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    flash("파일로 저장했어요");
  };
  var fileInput = document.getElementById("fileInput");
  document.getElementById("importBtn").onclick = function(){ fileInput.click(); };
  fileInput.onchange = function(){
    var file = fileInput.files && fileInput.files[0];
    fileInput.value = "";
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var incoming = JSON.parse(reader.result);
        if(!incoming || typeof incoming !== "object") throw new Error();
        var added = 0;
        Object.keys(incoming).forEach(function(k){
          var cur = data[k] || [];
          var ids = {};
          cur.forEach(function(e){ ids[e.id]=true; });
          var extra = (incoming[k]||[]).filter(function(e){ return e && !ids[e.id]; });
          added += extra.length;
          data[k] = cur.concat(extra).sort(bySort);
        });
        persist();
        render();
        flash(added>0 ? (added+"개 기록을 불러왔어요") : "새로 추가된 기록이 없어요");
      }catch(e){
        flash("파일을 읽을 수 없어요");
      }
    };
    reader.readAsText(file);
  };

  // ── 시작 ──
  syncSegs();
  syncTimeChips();
  syncViewToggle();
  render();
})();
</script>
</body>
</html>
